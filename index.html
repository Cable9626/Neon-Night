<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Neon-Nights Event</title>
   
</head> 

<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Lineup</a>
        <a href="#">Tickets</a>
    </nav>
    
    <header>
        <h1>Neon-Nights</h1>
        <p>June 21, 2026</p>
        <p> River Night-Club</p>
        <a href="#">Get tickets</a>
    </header>
<section id="lineup">
    <h2>Dj Lineup</h2>
    <div class="dj-grid">
    <div class="dj">
        <img class="dj" src="./assets/images/dj 1.jpg" alt="Dj Vortex"/>
        <p>Dj Vortex</p>

    </div>
</div>

<div class="dj">
    <img class="dj" src="./assets/images/dj 2.jpg" alt="Dj Pulse"/>
    <p>Dj Pulse</p>

</div>

<div class="dj">
    <img class="dj" src="./assets/images/dj 3.jpg" alt="Dj Neon"/>
    <p>Dj Neon</p>

</div>

</section>

<section id="gallery">
    <h2>Gallery</h2>
    <div class="gallery-grid">
        <img src="./assets/images/Crowd.jpg" alt="crowd"/>
        <img src="./assets/images/Crowd 2.jpg" alt="crowd 2"/>
        <img src="./assets/images/club lights.jpg" alt="club lights"/>
        <img src="./assets/images/dj booth.jpg" alt="dj booth"/>
    </div>
</section>

<section id="rsvp">
    <h2>RSVP / Tickets</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <select>
            <option value="">Select Ticket Type</option>
            <option value="vip">VIP</option>
            <option value="standard">Standard</option>
        </select>
        <button type="submit">Submit</button>
    </form>
</section>




<script src="script.js"></script>  
<footer>
    <p>Contact us: info@riverclub@gmail.com</p>
    <p>
        <a href="#"><img src="assets/icons/facebook.svg" alt="Facebook" width="35"/></a>
        <a href="#"><img src="./assets/icons/instagram.svg" alt="Instagram" width="35"/></a>
        <a href="#"><img src="./assets/icons/whatsapp.svg" alt="Whatsapp" width="35"/></a>
    </p>
    <p>&copy; 2026 Club River</p>
</footer>

</body>
</html>
